name: soulmate_ai
description: "SoulMate AI - Your exclusive AI companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.2
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.3

  # Data Persistence
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  path_provider: ^2.1.5
  crypto: ^3.0.6

  # UI Components & Animation
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  flutter_slidable: ^3.1.1
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  smooth_page_indicator: ^1.2.0+3
  flutter_markdown: ^0.7.6

  # Audio & Voice
  just_audio: ^0.9.43
  record: ^6.0.0
  audio_session: ^0.1.25
  http: ^1.2.0

  # WebView (for Alipay payment)
  webview_flutter: ^4.10.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  vad: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint
  very_good_analysis: ^7.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4

  # App Icon Generation
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  # Android
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  # iOS
  remove_alpha_ios: true
  # 禁用自动移除背景（保留 logo 自带的渐变背景）
  image_path_ios: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/audio/phone_ringtone.wav
